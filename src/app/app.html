<app-integrated-map/>
<button class="zoomToPosition" (click)="zoomToPosition()"></button>
<button class="toggleScooter" (click)="toggleScooter()" [class.active]="scooterVisible()"><img src="/icons/scooter.svg" width="20" height="20"></button>
<button class="toggleBicycle" (click)="toggleBicycle()" [class.active]="bicycleVisible()"><img src="/icons/bicycle.svg" width="20" height="20"></button>

<button class="toggleLime" (click)="toggleOperator('lime')" [class.operator]="limeVisible()">lime</button>
<button class="toggleBird" (click)="toggleOperator('bird')" [class.operator]="birdVisible()">bird</button>
<button class="toggleDott" (click)="toggleOperator('dott')" [class.operator]="dottVisible()">dott</button>
