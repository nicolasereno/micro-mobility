<app-integrated-map/>

<button class="zoomToPosition" matButton="filled" (click)="zoomToPosition()">Center Map</button>

<button class="reloadData" matButton="filled" (click)="reloadData()">Reload</button>

<div class="slider-wrapper">
  <mat-slider min="0" max="100" step="1">
    <input value="10" matSliderThumb (valueChange)="filterMinimumCharge($event)">
  </mat-slider>
</div>
<h3>{{ minimumCharge() }} %</h3>

<mat-button-toggle-group
  class="toggleVehicleTypes"
  name="vehicleTypes"
  aria-label="Vehicle Types"
  hideMultipleSelectionIndicator="true"
  multiple
>
  <mat-button-toggle value="scooter" (click)="toggleScooter()" (keydown)="toggleScooter()" checked>
    Scooter
  </mat-button-toggle>
  <mat-button-toggle value="bicycle" (click)="toggleBicycle()" (keydown)="toggleBicycle()" checked>
    Bicycle
  </mat-button-toggle>
</mat-button-toggle-group>


<mat-button-toggle-group
  class="toggleOperator"
  name="operators"
  aria-label="Operators"
  hideMultipleSelectionIndicator="true"
  multiple
>
  <mat-button-toggle value="lime" (click)="toggleOperator('lime')" (keydown)="toggleOperator('lime')" checked>Lime</mat-button-toggle>
  <mat-button-toggle value="eggs" (click)="toggleOperator('bird')" (keydown)="toggleOperator('bird')" checked>Bird</mat-button-toggle>
  <mat-button-toggle value="sugar" (click)="toggleOperator('dott')" (keydown)="toggleOperator('dott')" checked>Dott</mat-button-toggle>
</mat-button-toggle-group>
