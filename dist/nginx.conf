map $http_accept_language $preferred_lang {
    default en;

    ~*^it it;
    ~*^fr fr;
    ~*^de de;
    ~*^es es;
    ~*^ja ja;
    ~*^zh zh;
    ~*^en en;
}

server {
    listen 443 ssl;
    server_name smart-mobility.homelinuxserver.org;

    ssl_certificate     /usr/share/nginx/ssl/cert.pem;
    ssl_certificate_key /usr/share/nginx/ssl/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to detected language
    location = / {
        return 308 /$preferred_lang/;
    }

    # Serve localized Angular builds
    location ~ ^/(it|en|fr|de|es|ja|zh)/ {
        try_files $uri $uri/ /$1/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|json)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
